<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow - Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #1a2e1f 0%, #243328 100%);
      color: #f5f0e8;
      font-family: 'Jost', sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,121,65,0.25);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 500;
    }
    p {
      margin: 0 0 20px;
      color: #d9d0bc;
      font-size: 14px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #d9d0bc;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(245,240,232,0.2);
      background: rgba(14,26,16,0.45);
      color: #f5f0e8;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #c87941;
    }
    .btn {
      width: 100%;
      border: none;
      padding: 12px 14px;
      background: #c87941;
      color: #0e1a10;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 6px;
    }
    .links {
      margin-top: 14px;
      text-align: right;
    }
    .links a {
      color: #d9d0bc;
      text-decoration: none;
      font-size: 13px;
    }
    .links a:hover { color: #e09060; }
    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 14px;
    }
    .messages li {
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 3px solid #c87941;
      background: rgba(200,121,65,0.1);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <h1>Forgot Password</h1>
    <p>Enter your account email and type. We will send an OTP to reset your password.</p>

    <form method="POST" action="{% url 'forgot_password_page' %}">
      {% csrf_token %}
      <div class="field">
        <label for="user_type">Account Type</label>
        <select id="user_type" name="user_type" required>
          <option value="buyer">Buyer</option>
          <option value="seller">Seller</option>
        </select>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
      </div>
      <button class="btn" type="submit">Send OTP</button>
    </form>

    <div class="links">
      <a href="{% url 'signin_page' %}">Back to Sign In</a>
    </div>
  </div>
</body>
</html>
