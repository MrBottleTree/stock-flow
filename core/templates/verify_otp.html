<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow - OTP Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #1a2e1f 0%, #243328 100%);
      color: #f5f0e8;
      font-family: 'Jost', sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,121,65,0.25);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 500;
    }
    p {
      margin: 0 0 20px;
      color: #d9d0bc;
      font-size: 14px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #d9d0bc;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(245,240,232,0.2);
      background: rgba(14,26,16,0.45);
      color: #f5f0e8;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #c87941;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }
    .btn {
      border: none;
      padding: 12px 14px;
      background: #c87941;
      color: #0e1a10;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      flex: 1;
    }
    .btn.secondary {
      background: transparent;
      color: #d9d0bc;
      border: 1px solid rgba(245,240,232,0.2);
    }
    .btn.secondary:hover {
      border-color: rgba(245,240,232,0.4);
      color: #f5f0e8;
    }
    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 14px;
    }
    .messages li {
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 3px solid #c87941;
      background: rgba(200,121,65,0.1);
      font-size: 13px;
    }
    .hint {
      color: #d9d0bc;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <h1>{{ flow_title }}</h1>
    <p>{{ flow_subtitle }}</p>
    <p class="hint">OTP sent to: <strong>{{ email }}</strong></p>

    <form method="POST" action="{% url post_url_name %}">
      {% csrf_token %}

      <div class="field">
        <label for="otp">OTP</label>
        <input id="otp" name="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="Enter 6-digit OTP" required />
      </div>

      {% if show_password_fields %}
        <div class="field">
          <label for="new_password">New Password</label>
          <input id="new_password" name="new_password" type="password" minlength="8" required />
        </div>
        <div class="field">
          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" minlength="8" required />
        </div>
      {% endif %}

      <div class="row">
        <button class="btn" type="submit">Verify</button>
        <button class="btn secondary" type="submit" name="action" value="resend">Resend OTP</button>
      </div>
    </form>
  </div>
</body>
</html>
